name: Update Main Version
run-name: Move ${{ inputs.major_version }} to ${{ inputs.target }}

on:
  workflow_dispatch:
    inputs:
      target:
        description: The tag or reference to use
        required: true
      major_version:
        type: choice
        description: The major version to update
        options:
          - v1
  workflow_call:
    inputs:
      target:
        description: The tag or reference to use
        required: true
        type: string
      major_version:
        # workflow_call cannot use type: choice; the caller passes the major
        # derived from the release tag (e.g. v1, and v2 once it exists).
        description: The major version to update
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      # Note this update workflow can also be used as a rollback tool.
      # For that reason, it's best to pin `actions/checkout` to a known, stable version
      # (typically, about two releases back).
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Tag new target
        run: git tag -f ${{ inputs.major_version }} ${{ inputs.target }}
      - name: Push new tag
        run: git push origin ${{ inputs.major_version }} --force
