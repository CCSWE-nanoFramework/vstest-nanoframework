name: Continuous Integration

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Test
        id: npm-ci-test
        run: npm run ci-test

  test-action:
    name: GitHub Actions Test
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      SOLUTION_FOLDER: './solution/'
      SOLUTION: 'VsTestAction.sln'

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup nanoFramework
        # Temporarily pointed at the composites branch for validation; flip to
        # @master once CCSWE-nanoFramework/actions-nanoframework#1 merges.
        uses: CCSWE-nanoFramework/actions-nanoframework/setup-nanoframework@feature/composite-actions

      - name: Build solution
        uses: CCSWE-nanoFramework/actions-nanoframework/build-nanoframework@feature/composite-actions
        with:
          solution: ${{ env.SOLUTION_FOLDER }}${{ env.SOLUTION }}

      - name: Test Local Action
        id: test-action
        uses: ./
        with:
          solutionFolder: ${{ env.SOLUTION_FOLDER }}
          runSettings: ${{ env.SOLUTION_FOLDER }}NFUnitTest1/nano.runsettings
          artifactName: 'non-default-artifact-name'
          artifactRetentionDays: 1
